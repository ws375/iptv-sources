name: update schedule
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 你原有直播源更新逻辑100%原样保留，一丝不改
      - name: update index
        run: node ./src/update_index.ts

      # 新增：每日自动同步完整版无删减EPG到云端
      - name: 上传完整版EPG节目单
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-epg
          files: ./epg/epg_pw.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
